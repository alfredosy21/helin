<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helin | Home</title>
  <style>
:root{
  --helin:#34b1b5;
  --helin-soft:#97d5d4;
  --navy:#0b2340;
  --muted:#60788f;
  --line:#dbeeee;
  --bg:#f6fbfb;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);color:var(--navy)}
body{min-height:100vh}
a{text-decoration:none;color:inherit}
.header{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  padding:14px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;
}
.header-left{display:flex;align-items:center;gap:16px;min-width:0}
.logo{font-size:34px;font-weight:900;color:var(--helin);letter-spacing:-.05em;line-height:1;white-space:nowrap}
.meta{min-width:0}
.meta h1{font-size:18px;line-height:1.1;margin:0;font-weight:900;letter-spacing:-.02em}
.meta p{font-size:12px;line-height:1.35;margin:4px 0 0;color:var(--muted);max-width:820px}
.nav{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid rgba(52,177,181,.35);
  background:#fff;color:var(--helin);
  border-radius:999px;padding:9px 13px;
  font-size:12px;font-weight:850;white-space:nowrap;
}
.btn:hover{background:var(--helin);color:#fff}
.btn.primary{background:var(--helin);color:#fff;box-shadow:0 10px 24px rgba(52,177,181,.20)}
.stage{padding:26px 18px 42px}
.frame{
  width:fit-content;
  max-width:100%;
  margin:0 auto;
  background:#fff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:12px;
  box-shadow:0 18px 45px rgba(11,35,64,.08);
}
.frame img{
  display:block;
  width:auto;
  max-width:100%;
  height:auto;
  border-radius:14px;
  image-rendering:auto;
}
.note{
  max-width:980px;margin:18px auto 0;
  color:#60788f;font-size:13px;line-height:1.5;text-align:center;
}
@media(max-width:820px){
  .header{flex-direction:column;align-items:flex-start;padding:12px 14px}
  .nav{justify-content:flex-start;overflow:auto;width:100%;flex-wrap:nowrap;padding-bottom:4px}
  .btn{min-width:max-content}
  .stage{padding:14px 8px 28px}
  .frame{padding:8px;border-radius:16px}
  .frame img{border-radius:10px}
}
</style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a class="logo" href="index.html">helin.</a>
      <div class="meta">
        <h1>Home</h1>
        <p>Pantalla principal con hero, beneficios, categorías, destacados, más vendidos, testimonios y footer.</p>
      </div>
    </div>
    <nav class="nav">
      <a class="btn" href="index.html">Índice</a>
      <a class="btn" href="14-politicas.html">← Anterior</a>
      <a class="btn primary" href="02-menu-detallado.html">Siguiente →</a>
    </nav>
  </header>

  <main class="stage">
    <section class="frame" style="max-width:578px">
      <img src="assets/01-home.jpg" alt="Home" width="554" height="2048" />
    </section>
    <p class="note">Vista individual en HTML. La imagen se muestra a su tamaño natural máximo para evitar pixelación por escalado.</p>
  </main>
</body>
</html>
